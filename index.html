<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Notion Trading Dashboard</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root{color-scheme:dark}
    body{margin:0;font-family:Inter,system-ui,sans-serif;background:#0b0f14;color:#e5eef7}
    header{padding:20px 24px;border-bottom:1px solid #223142}
    main{padding:20px;display:grid;gap:20px}
    .card{background:#111824;border:1px solid #223142;border-radius:16px;padding:16px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:16px}
    .chart{height:420px}
    .chart.tall{height:520px}
  </style>
</head>
<body>
<header><h1>Notion Trading Dashboard</h1></header>
<main>
  <section class="card"><div id="overall" class="chart tall"></div></section>
  <section class="grid" id="accounts"></section>
  <section class="card"><div id="hist" class="chart"></div></section>
  <section class="card"><div id="pie" class="chart"></div></section>
</main>
<script>
fetch('./data.json').then(r=>r.json()).then(({rows, byAccount, totals})=>{
  const colors=['#4cc9f0','#f72585','#b5179e','#7209b7','#3a0ca3','#4361ee'];
  const accounts = Object.keys(byAccount);
  const overall = accounts.map((acc,i)=>({x:byAccount[acc].map(r=>r.date), y:byAccount[acc].map(r=>+r.pnl||0), mode:'lines', name:`${acc} P&L`, line:{width:2,color:colors[i%colors.length]}}));
  Plotly.newPlot('overall', overall, {paper_bgcolor:'transparent',plot_bgcolor:'transparent',font:{color:'#e5eef7'},title:'Overall P&L by account',legend:{orientation:'h'},xaxis:{title:'Date'},yaxis:{title:'P&L'}}, {responsive:true});
  const wrap=document.getElementById('accounts');
  accounts.forEach((acc,i)=>{
    const card=document.createElement('div');
    card.className='card';
    card.innerHTML=`<div id="${acc.replace(/[^a-z0-9]+/gi,'_')}"></div>`;
    wrap.appendChild(card);
    const arr=byAccount[acc];
    Plotly.newPlot(card.firstChild,[
      {x:arr.map(r=>r.date), y:arr.map(r=>+r.pnl||0), mode:'lines', name:'P&L', line:{width:2,color:colors[i%colors.length]}},
      {x:arr.map(r=>r.date), y:arr.map(r=>+r.balance||0), mode:'lines', name:'Balance', line:{width:2,dash:'dash',color:'#a8dadc'}},
      {x:arr.map(r=>r.date), y:arr.map(r=>+r.drawdown||0), mode:'lines', name:'Drawdown', line:{width:2,dash:'dot',color:'#ffb703'}}
    ], {paper_bgcolor:'transparent',plot_bgcolor:'transparent',font:{color:'#e5eef7'},title:acc,legend:{orientation:'h'},xaxis:{title:'Date'},yaxis:{title:'Value'}}, {responsive:true});
  });
  Plotly.newPlot('hist', [
    {x:rows.map(r=>+r.best_trade||0), name:'Best trades', type:'histogram', opacity:0.75},
    {x:rows.map(r=>+r.worst_trade||0), name:'Worst trades', type:'histogram', opacity:0.75}
  ], {barmode:'overlay',paper_bgcolor:'transparent',plot_bgcolor:'transparent',font:{color:'#e5eef7'},title:'Best and worst trades',xaxis:{title:'Trade size'},yaxis:{title:'Count'}}, {responsive:true});
  const profitable = totals.filter(d => d.pnl > 0);
  Plotly.newPlot('pie', [{labels:profitable.map(d=>d.account), values:profitable.map(d=>d.pnl), type:'pie', hole:.35, textinfo:'percent+label'}], {paper_bgcolor:'transparent',plot_bgcolor:'transparent',font:{color:'#e5eef7'},title:'Most profitable account',uniformtext_minsize:14,uniformtext_mode:'hide'}, {responsive:true});
});
</script>
</body>
</html>
